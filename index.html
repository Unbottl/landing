<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unbottl | Your Private AI Sanctuary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0F0F12;
            --accent: #9575CD;
            --text-main: #FFFFFF;
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            text-align: center;
        }

        .aurora {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% -20%, #1A1A2E 0%, #0F0F12 100%);
            z-index: -1;
        }

        .container {
            max-width: 600px;
            padding: 40px 20px;
            z-index: 1;
        }

        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 60px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        p {
            font-size: 1.2rem;
            color: var(--text-dim);
            margin-bottom: 48px;
            line-height: 1.6;
        }

        .waitlist-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        input[type="email"] {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px 24px;
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        input[type="email"]:focus {
            border-color: var(--accent);
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 80px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
        }

        a {
            color: inherit;
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="aurora"></div>
    
    <div class="container">
        <div class="logo">Unbottl</div>
        <h1>Come in messy.<br>Leave clearer.</h1>
        <p>Your private AI sanctuary for emotional hygiene. Vent without judgment, untie the knots, and get your Clarity Report.</p>

        <form action="https://formspree.io/f/xyknwvyl" method="POST" class="waitlist-form">
            <input type="email" name="email" placeholder="Enter your email for early access" required>
            <button type="submit">GET EARLY ACCESS</button>
        </form>

        <div class="footer">
            COMING SOON TO THE APP STORE • <a href="privacy.html">PRIVACY POLICY</a>
        </div>
    </div>
</body>
</html>
